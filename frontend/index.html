<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Agent</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="token-modal" class="modal" hidden>
    <form id="token-form" class="modal-card">
      <h2>Enter access token</h2>
      <p>The bearer token is held only in memory for this page session.</p>
      <input id="token-input" type="password" autocomplete="off" required placeholder="APP_AUTH_TOKEN" />
      <button type="submit">Continue</button>
    </form>
  </div>

  <div id="app" class="layout">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h1>Sessions</h1>
        <button id="new-chat" type="button">New chat</button>
      </header>
      <ul id="session-list" class="session-list"></ul>

      <section id="ally-panel" class="ally-panel" aria-label="Ally summary">
        <header class="ally-panel-header">
          <span class="ally-panel-title">Ally</span>
          <span id="ally-warning" class="ally-warning" hidden aria-hidden="true">&#9888;</span>
        </header>
        <dl class="ally-fields">
          <div class="ally-row">
            <dt>Topic</dt>
            <dd id="ally-topic" class="ally-value"></dd>
          </div>
          <div class="ally-row">
            <dt>Class</dt>
            <dd id="ally-class" class="ally-value"></dd>
          </div>
          <div class="ally-row">
            <dt>UK time</dt>
            <dd id="ally-time" class="ally-value"></dd>
          </div>
          <div class="ally-row">
            <dt>Length</dt>
            <dd id="ally-length" class="ally-value"></dd>
          </div>
        </dl>
      </section>
    </aside>

    <main class="main-pane">
      <section id="conversation" class="conversation"></section>
      <form id="composer" class="composer">
        <textarea id="composer-input" rows="2" placeholder="Send a message" required></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
